# .github/workflows/release.yml
name: Build & Release

on:
  push:
    branches: [main]
    paths: ['version']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      manifest_version: ${{ steps.version.outputs.manifest_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(cat version | tr -d '[:space:]')
          MANIFEST_VERSION=$(printf '%s' "$VERSION" | sed 's/^v//I' | sed 's/-.*$//')
          if printf '%s' "$VERSION" | grep -q -- '-pre'; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "manifest_version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"
          echo "Manifest version: $MANIFEST_VERSION"
          echo "Prerelease: $IS_PRERELEASE"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: get-version
    if: needs.get-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install

      - name: Sync version to manifests
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          MANIFEST_VERSION="${{ needs.get-version.outputs.manifest_version }}"
          # Update package.json
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          # Update manifest.json
          jq --arg v "$MANIFEST_VERSION" '.version = $v' manifest.json > tmp.json && mv tmp.json manifest.json
          # Update manifest.firefox.json
          jq --arg v "$MANIFEST_VERSION" '.version = $v' manifest.firefox.json > tmp.json && mv tmp.json manifest.firefox.json
          echo "Synced package version $VERSION and manifest version $MANIFEST_VERSION"

      - name: Build userscript
        run: bun run build

      - name: Build Chrome extension
        run: bun run build:extension

      - name: Build Firefox extension
        run: bun run build:firefox

      - name: Collect build artifacts
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          mkdir -p release-assets

          # Userscript
          if [ -f dist/userscript/Mieru-OCR.user.js ]; then
            cp dist/userscript/Mieru-OCR.user.js "release-assets/Mieru-OCR-v${VERSION}.user.js"
            echo "Collected userscript"
          fi

          # Chrome extension zip
          CHROME_ZIP=$(find dist/ -name "Mieru-OCR-v*.zip" -type f | head -1)
          if [ -n "$CHROME_ZIP" ]; then
            cp "$CHROME_ZIP" "release-assets/Mieru-OCR-chrome-v${VERSION}.zip"
            echo "Collected Chrome extension"
          fi

          # Firefox extension zip
          FIREFOX_ZIP=$(find dist/ -name "Mieru-OCR-firefox-v*.zip" -type f | head -1)
          if [ -n "$FIREFOX_ZIP" ]; then
            cp "$FIREFOX_ZIP" "release-assets/Mieru-OCR-firefox-v${VERSION}.zip"
            echo "Collected Firefox extension"
          fi

          ls -la release-assets/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-assets
          path: release-assets/*
          retention-days: 5

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-assets
          path: release-assets

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="v${{ needs.get-version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            RAW_LOGS=$(git log --pretty=format:"%s (%h)" -30)
          else
            RAW_LOGS=$(git log --pretty=format:"%s (%h)" "${PREV_TAG}..HEAD")
          fi

          CHANGES=""
          while IFS= read -r line; do
            clean=$(echo "$line" | sed 's/^```[[:space:]]*//' | sed 's/```$//')
            if [ -n "$clean" ]; then
              CHANGES="${CHANGES}- ${clean}"$'\n'
            fi
          done <<< "$RAW_LOGS"

          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate file checksums
        id: checksums
        run: |
          cd release-assets
          SUMS=""
          for f in *; do
            HASH=$(sha256sum "$f" | cut -d' ' -f1)
            SIZE=$(stat -c%s "$f")
            SIZE_MB=$(echo "scale=1; $SIZE / 1048576" | bc)
            SUMS="${SUMS}| \`${f}\` | \`${HASH:0:16}...\` | ${SIZE_MB} MB |"$'\n'
          done
          cd ..

          {
            echo "sums<<EOF"
            echo "$SUMS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: Mieru-OCR v${{ needs.get-version.outputs.version }}
          body: |
            ## Mieru-OCR v${{ needs.get-version.outputs.version }}

            完全离线的验证码识别工具，支持浏览器扩展和油猴脚本。

            ### 📋 更新日志

            ${{ steps.changelog.outputs.changes }}

            ---

            ### 📦 下载

            | 类型 | 下载 | 说明 |
            |:----:|:----:|:-----|
            | 油猴脚本 | [![Userscript](https://img.shields.io/badge/Tampermonkey-Userscript-00485B?style=for-the-badge&logo=tampermonkey&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/v${{ needs.get-version.outputs.version }}/Mieru-OCR-v${{ needs.get-version.outputs.version }}.user.js) | Tampermonkey / Violentmonkey |
            | Chrome | [![Chrome](https://img.shields.io/badge/Chrome-Extension-4285F4?style=for-the-badge&logo=googlechrome&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/v${{ needs.get-version.outputs.version }}/Mieru-OCR-chrome-v${{ needs.get-version.outputs.version }}.zip) | Chrome / Edge (MV3) |
            | Firefox | [![Firefox](https://img.shields.io/badge/Firefox-Extension-FF7139?style=for-the-badge&logo=firefoxbrowser&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/v${{ needs.get-version.outputs.version }}/Mieru-OCR-firefox-v${{ needs.get-version.outputs.version }}.zip) | Firefox (MV2) |

            ---

            ### 🔧 安装说明

            **油猴脚本**
            1. 安装 [Tampermonkey](https://www.tampermonkey.net/) 或 [Violentmonkey](https://violentmonkey.github.io/)
            2. 点击上方下载链接安装脚本
            3. 首次使用需设置白名单，会自动下载模型文件

            **Chrome / Edge 扩展**
            1. 下载 Chrome 扩展 zip 并解压
            2. 打开 `chrome://extensions/`，启用开发者模式
            3. 点击"加载已解压的扩展程序"，选择解压目录

            **Firefox 扩展**
            1. 下载 Firefox 扩展 zip
            2. 打开 `about:debugging#/runtime/this-firefox`
            3. 点击"临时载入附加组件"，选择 zip 文件

            ---

            ### 🔐 校验和

            | 文件 | SHA-256 | 大小 |
            |:-----|:--------|:-----|
            ${{ steps.checksums.outputs.sums }}

            ---

            > 💡 所有识别均在本地离线完成，不上传任何数据。
          files: release-assets/*
          draft: false
          prerelease: ${{ needs.get-version.outputs.is_prerelease == 'true' }}